version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: swift_track_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: swift_track_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/swift_track
      - JWT_SECRET=supersecret
      - ML_SERVICE_URL=http://ml_service:8000
    depends_on:
      - mongodb
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules

  frontend:
    build: ./frontend
    container_name: swift_track_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules

  ml_service:
    build: ./ml_service
    container_name: swift_track_ml_service
    ports:
      - "8000:8000"
    volumes:
      - ./ml_service:/app

volumes:
  mongo_data:
